<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDC Penny Tracker - Vercel Server</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-slate-900">USDC Penny Tracker <span class="text-blue-600 text-xs">v3.0 SERVER</span></h1>
            <div id="status" class="text-xs font-bold px-3 py-1 rounded-full uppercase bg-slate-100 text-slate-500">Sincronizando...</div>
        </header>

        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-slate-500 text-[10px] uppercase font-black">
                    <tr>
                        <th class="px-6 py-4">Par</th>
                        <th class="px-6 py-4">Preço</th>
                        <th class="px-6 py-4">Score Eficiência</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100 font-medium">
                    <tr><td colspan="3" class="px-6 py-20 text-center text-slate-400">A processar dados no servidor...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadData() {
            const status = document.getElementById('status');
            try {
                // Chama a API que você criou na Vercel (sem problemas de CORS!)
                const res = await fetch('/api/data');
                const data = await res.json();
                
                document.getElementById('tableBody').innerHTML = data.map(i => `
                    <tr class="hover:bg-slate-50">
                        <td class="px-6 py-4 font-bold text-slate-900">${i.symbol}</td>
                        <td class="px-6 py-4 text-blue-600 font-mono">${i.price}</td>
                        <td class="px-6 py-4 font-black text-slate-800">${i.score}</td>
                    </tr>
                `).join('');
                
                status.innerText = "Atualizado";
                status.className = "text-xs font-bold px-3 py-1 rounded-full uppercase bg-green-100 text-green-600";
            } catch (e) {
                status.innerText = "Erro no Servidor";
                status.className = "text-xs font-bold px-3 py-1 rounded-full uppercase bg-red-100 text-red-600";
            }
        }
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
