<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDC Penny Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-extrabold text-slate-900">USDC Penny Tracker <span class="text-blue-600 text-xs font-mono">v1.7</span></h1>
                <p id="status-text" class="text-slate-500 text-sm italic">Tentando conexão segura...</p>
            </div>
            <button onclick="updateMarketData()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg shadow-md transition-all active:scale-95">
                Atualizar Agora
            </button>
        </header>

        <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8"></div>

        <div class="card overflow-hidden shadow-sm">
            <div class="bg-white border-b border-slate-100 px-6 py-4">
                <h2 class="font-bold text-slate-800 uppercase text-xs tracking-widest">Ranking de Eficiência (USDC)</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-[10px] uppercase font-bold">
                        <tr>
                            <th class="px-6 py-3">Par</th>
                            <th class="px-6 py-3">Preço</th>
                            <th class="px-6 py-3">Volume</th>
                            <th class="px-6 py-3">Score</th>
                        </tr>
                    </thead>
                    <tbody id="marketTableBody" class="divide-y divide-slate-100">
                        <tr><td colspan="4" class="px-6 py-10 text-center text-slate-400">Sincronizando dados...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function updateMarketData() {
            const statusText = document.getElementById('status-text');
            const table = document.getElementById('marketTableBody');
            
            // Usando CorsProxy.io que é mais estável para APIs de trading
            const targetUrl = 'https://api.binance.com/api/3/ticker/24hr';
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

            try {
                statusText.innerText = "Conectando ao servidor global...";
                const response = await fetch(proxyUrl);
                
                if (!response.ok) throw new Error();
                
                const data = await response.json();
                
                const filtered = data
                    .filter(t => t.symbol.endsWith('USDC') && parseFloat(t.lastPrice) <= 0.05 && parseFloat(t.quoteVolume) > 100000)
                    .map(t => {
                        const vola = Math.abs(parseFloat(t.priceChangePercent));
                        const volume = parseFloat(t.quoteVolume);
                        return {
                            symbol: t.symbol.replace('USDC', ''),
                            price: parseFloat(t.lastPrice).toFixed(6),
                            volume: volume,
                            score: (vola * (volume / 1000000)).toFixed(2)
                        };
                    })
                    .sort((a, b) => b.score - a.score);

                renderAll(filtered);
                statusText.innerText = "Conexão estável. Dados atualizados.";
                statusText.className = "text-green-600 text-sm font-bold";
            } catch (e) {
                console.error(e);
                statusText.innerText = "Erro persistente de rede. Verifique seu navegador.";
                statusText.className = "text-red-500 text-sm font-bold";
                table.innerHTML = '<tr><td colspan="4" class="px-6 py-10 text-center text-red-400">Falha ao obter dados. Tente usar o Chrome sem extensões.</td></tr>';
            }
        }

        function renderAll(data) {
            const table = document.getElementById('marketTableBody');
            const stats = document.getElementById('statsGrid');

            if (data.length === 0) {
                table.innerHTML = '<tr><td colspan="4" class="px-6 py-10 text-center text-slate-400">Nenhuma oportunidade penny encontrada.</td></tr>';
                return;
            }

            table.innerHTML = data.map(i => `
                <tr class="hover:bg-blue-50/50 transition-colors">
                    <td class="px-6 py-4 font-bold text-slate-900">${i.symbol}<span class="text-[10px] text-slate-400">/USDC</span></td>
                    <td class="px-6 py-4 text-blue-600 font-mono text-sm">${i.price}</td>
                    <td class="px-6 py-4 text-slate-500 text-sm">$${(i.volume/1000).toFixed(0)}k</td>
                    <td class="px-6 py-4 font-black text-slate-800">${i.score}</td>
                </tr>
            `).join('');

            const top = data[0];
            stats.innerHTML = `
                <div class="card p-4 border-l-4 border-blue-600">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Principal Oportunidade</p>
                    <h3 class="text-xl font-black text-slate-900">${top.symbol}</h3>
                </div>
                <div class="card p-4 border-l-4 border-green-500">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Pares Analisados</p>
                    <h3 class="text-xl font-black text-slate-900">${data.length}</h3>
                </div>
                <div class="card p-4 border-l-4 border-amber-500">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Eficiência Global</p>
                    <h3 class="text-xl font-black text-slate-900">Alta</h3>
                </div>
            `;
        }

        updateMarketData();
        setInterval(updateMarketData, 60000);
    </script>
</body>
</html>
