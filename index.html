<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex USDC Bot Analyzer - Binance Spot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .status-ideal { color: #059669; background-color: #d1fae5; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">USDC Penny Tracker <span class="text-blue-600 text-sm font-normal">v1.4</span></h1>
                <p class="text-gray-500 mt-1">Análise via Proxy para contornar bloqueios de CORS na Vercel.</p>
            </div>
            <div class="flex items-center gap-3">
                <div id="loadingIndicator" class="hidden items-center gap-2 text-blue-600 font-medium">
                    <div class="w-2 h-2 bg-blue-600 rounded-full pulse"></div> Sincronizando...
                </div>
                <button onclick="updateMarketData()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-5 rounded-lg transition-all shadow-md active:scale-95">
                    Atualizar Dados
                </button>
            </div>
        </header>

        <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8"></div>

        <div class="card overflow-hidden">
            <div class="bg-white border-b border-gray-100 px-6 py-4 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-gray-800">Ranking de Eficiência</h2>
                <span id="apiStatus" class="text-xs font-mono text-gray-400 font-bold">A LER VIA PROXY...</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 text-sm uppercase tracking-wider">
                            <th class="px-6 py-4 font-semibold">Par</th>
                            <th class="px-6 py-4 font-semibold">Preço (USDC)</th>
                            <th class="px-6 py-4 font-semibold">Variação 24h</th>
                            <th class="px-6 py-4 font-semibold">Volume (USDC)</th>
                            <th class="px-6 py-4 font-semibold">Score Bot</th>
                        </tr>
                    </thead>
                    <tbody id="marketTableBody" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>

        <footer class="mt-8 text-center text-gray-400 text-sm">
            Filtros: Preço <= 0.05 USDC | Volume > 100k USDC | Conexão: Proxy AllOrigins
        </footer>
    </div>

    <script>
        const MAX_PRICE = 0.05;
        const MIN_VOLUME = 100000;

        async function updateMarketData() {
            const loader = document.getElementById('loadingIndicator');
            const statusLabel = document.getElementById('apiStatus');
            loader.classList.replace('hidden', 'flex');

            try {
                // Utilização do Proxy AllOrigins para contornar o erro visível na image_856d1a.png
                const targetUrl = encodeURIComponent('https://api.binance.com/api/3/ticker/24hr');
                const response = await fetch(`https://api.allorigins.win/get?url=${targetUrl}`);
                
                if (!response.ok) throw new Error();
                
                const wrapper = await response.json();
                const data = JSON.parse(wrapper.contents); // O AllOrigins devolve os dados dentro de 'contents'

                statusLabel.innerText = "ONLINE (PROXY)";
                statusLabel.className = "text-xs font-mono text-green-500 font-bold";

                const candidates = data.filter(item => {
                    const price = parseFloat(item.lastPrice);
                    const volume = parseFloat(item.quoteVolume);
                    return item.symbol.endsWith('USDC') && price <= MAX_PRICE && volume >= MIN_VOLUME;
                });

                const processed = candidates.map(t => {
                    const vola = Math.abs(parseFloat(t.priceChangePercent));
                    const volume = parseFloat(t.quoteVolume);
                    const score = (vola * (volume / 1000000)).toFixed(2);
                    
                    return {
                        symbol: t.symbol,
                        price: parseFloat(t.lastPrice).toFixed(6),
                        change: t.priceChangePercent,
                        volume: volume,
                        score: parseFloat(score)
                    };
                }).sort((a, b) => b.score - a.score);

                renderContent(processed);
            } catch (error) {
                statusLabel.innerText = "ERRO DE PROXY";
                statusLabel.className = "text-xs font-mono text-red-500 font-bold";
                console.error("Proxy Error:", error);
            } finally {
                loader.classList.replace('flex', 'hidden');
            }
        }

        function renderContent(data) {
            const tableBody = document.getElementById('marketTableBody');
            const statsGrid = document.getElementById('statsGrid');

            if (data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-gray-500">A processar dados via Proxy...</td></tr>';
                return;
            }

            tableBody.innerHTML = data.map(item => `
                <tr class="hover:bg-blue-50/30 transition-colors">
                    <td class="px-6 py-4 font-bold text-gray-900">${item.symbol}</td>
                    <td class="px-6 py-4 text-blue-600 font-medium font-mono">${item.price}</td>
                    <td class="px-6 py-4">
                        <span class="${parseFloat(item.change) >= 0 ? 'text-green-600' : 'text-red-600'} font-semibold">
                            ${parseFloat(item.change) > 0 ? '+' : ''}${item.change}%
                        </span>
                    </td>
                    <td class="px-6 py-4 text-gray-600 font-mono text-sm">${(item.volume / 1000).toFixed(1)}k</td>
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-2">
                            <span class="text-lg font-bold text-gray-800">${item.score}</span>
                            ${item.score > 5 ? '<span class="status-ideal">FOCO</span>' : ''}
                        </div>
                    </td>
                </tr>
            `).join('');

            const top = data[0];
            const mostVol = [...data].sort((a,b) => Math.abs(b.change) - Math.abs(a.change))[0];

            statsGrid.innerHTML = `
                <div class="card p-6 border-t-4 border-blue-600">
                    <p class="text-sm font-semibold text-gray-500 uppercase font-bold">Top Escolha</p>
                    <h3 class="text-2xl font-extrabold text-gray-900 mt-1">${top.symbol}</h3>
                    <p class="text-sm text-blue-600 mt-2 font-medium">Score: ${top.score}</p>
                </div>
                <div class="card p-6 border-t-4 border-green-500">
                    <p class="text-sm font-semibold text-gray-500 uppercase font-bold">Mais Volátil</p>
                    <h3 class="text-2xl font-extrabold text-gray-900 mt-1">${mostVol.symbol}</h3>
                    <p class="text-sm text-green-600 mt-2 font-medium">${mostVol.change}%</p>
                </div>
                <div class="card p-6 border-t-4 border-purple-500">
                    <p class="text-sm font-semibold text-gray-500 uppercase font-bold">Penny Pairs</p>
                    <h3 class="text-2xl font-extrabold text-gray-900 mt-1">${data.length} Encontrados</h3>
                    <p class="text-sm text-purple-600 mt-2 font-medium">Análise filtrada</p>
                </div>
            `;
        }

        updateMarketData();
        setInterval(updateMarketData, 30000);
    </script>
</body>
</html>
