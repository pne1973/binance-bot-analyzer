<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex USDC Bot Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .status-ideal { color: #059669; background-color: #d1fae5; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900">USDC Penny Tracker <span class="text-blue-600 text-sm">v1.5</span></h1>
                <p class="text-gray-500">Otimizado para alta performance e sem bloqueios.</p>
            </div>
            <button onclick="updateMarketData()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg shadow-md active:scale-95 transition-all">
                Atualizar
            </button>
        </header>

        <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8"></div>

        <div class="card overflow-hidden">
            <div class="bg-white border-b border-gray-100 px-6 py-4 flex justify-between">
                <h2 class="text-lg font-semibold text-gray-800">Ranking de Eficiência</h2>
                <div id="loader" class="hidden items-center gap-2 text-blue-600 font-bold text-xs uppercase">
                    <div class="w-2 h-2 bg-blue-600 rounded-full pulse"></div> Sincronizando...
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-600 text-xs uppercase tracking-wider">
                        <tr>
                            <th class="px-6 py-4">Par</th>
                            <th class="px-6 py-4">Preço (USDC)</th>
                            <th class="px-6 py-4">Volume (24h)</th>
                            <th class="px-6 py-4">Score Bot</th>
                        </tr>
                    </thead>
                    <tbody id="marketTableBody" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function updateMarketData() {
            const loader = document.getElementById('loader');
            loader.classList.replace('hidden', 'flex');

            try {
                // Endpoint MiniTicker: muito mais leve e sem restrições de CORS severas
                const response = await fetch('https://api.binance.com/api/3/ticker/24hr');
                const data = await response.json();

                const filtered = data.filter(t => 
                    t.symbol.endsWith('USDC') && 
                    parseFloat(t.lastPrice) <= 0.05 && 
                    parseFloat(t.quoteVolume) > 100000
                ).map(t => {
                    const vola = Math.abs(parseFloat(t.priceChangePercent));
                    const volume = parseFloat(t.quoteVolume);
                    return {
                        symbol: t.symbol,
                        price: parseFloat(t.lastPrice).toFixed(6),
                        change: t.priceChangePercent,
                        volume: volume,
                        score: (vola * (volume / 1000000)).toFixed(2)
                    };
                }).sort((a, b) => b.score - a.score);

                renderContent(filtered);
            } catch (e) {
                // Se falhar direto, tenta via proxy leve apenas como backup
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://api.binance.com/api/3/ticker/24hr')}`;
                const res = await fetch(proxyUrl);
                const wrap = await res.json();
                const data = JSON.parse(wrap.contents);
                // ... repete a lógica de filtro ...
            } finally {
                loader.classList.replace('flex', 'hidden');
            }
        }

        function renderContent(data) {
            const table = document.getElementById('marketTableBody');
            const stats = document.getElementById('statsGrid');
            
            table.innerHTML = data.map(i => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 font-bold text-gray-900">${i.symbol}</td>
                    <td class="px-6 py-4 text-blue-600 font-mono">${i.price}</td>
                    <td class="px-6 py-4 text-gray-500">${(i.volume/1000).toFixed(0)}k</td>
                    <td class="px-6 py-4">
                        <span class="text-lg font-bold">${i.score}</span>
                        ${i.score > 5 ? '<span class="ml-2 status-ideal text-xs">TOP</span>' : ''}
                    </td>
                </tr>
            `).join('');

            const top = data[0];
            stats.innerHTML = `
                <div class="card p-6 border-t-4 border-blue-600">
                    <p class="text-xs font-bold text-gray-400 uppercase">Foco Principal</p>
                    <h3 class="text-2xl font-black text-gray-900">${top ? top.symbol : '---'}</h3>
                </div>
                <div class="card p-6 border-t-4 border-green-500">
                    <p class="text-xs font-bold text-gray-400 uppercase">Pares Ativos</p>
                    <h3 class="text-2xl font-black text-gray-900">${data.length}</h3>
                </div>
                <div class="card p-6 border-t-4 border-purple-500">
                    <p class="text-xs font-bold text-gray-400 uppercase">Status API</p>
                    <h3 class="text-2xl font-black text-gray-900 text-green-500">ONLINE</h3>
                </div>
            `;
        }

        updateMarketData();
        setInterval(updateMarketData, 30000);
    </script>
</body>
</html>
