<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>USDC Tracker v3.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; font-family: sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body class="text-white p-6">
    <div class="max-w-xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-black">USDC Tracker <span class="text-blue-500">v3.5</span></h1>
            <div id="status" class="text-[10px] font-bold px-2 py-1 rounded bg-slate-800">CONECTANDO...</div>
        </header>

        <div class="card rounded-xl overflow-hidden shadow-2xl">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-700/50 text-slate-400 text-[10px] uppercase font-bold">
                    <tr>
                        <th class="px-4 py-3">Ativo</th>
                        <th class="px-4 py-3">Preço</th>
                        <th class="px-4 py-3">Score</th>
                    </tr>
                </thead>
                <tbody id="lista" class="divide-y divide-slate-700">
                    <tr><td colspan="3" class="p-20 text-center text-slate-500 italic">Estabelecendo túnel de dados...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function update() {
            const status = document.getElementById('status');
            const lista = document.getElementById('lista');

            try {
                // Mudança para CorsProxy.io para resolver o travamento na image_84fc5d.png
                const target = `https://api.binance.com/api/3/ticker/24hr`;
                const proxy = `https://corsproxy.io/?${encodeURIComponent(target)}`;
                
                const res = await fetch(proxy);
                if (!res.ok) throw new Error();
                const data = await res.json();

                const filtered = data
                    .filter(t => t.symbol.endsWith('USDC') && parseFloat(t.lastPrice) <= 0.05 && parseFloat(t.quoteVolume) > 100000)
                    .map(t => ({
                        s: t.symbol.replace('USDC', ''),
                        p: parseFloat(t.lastPrice).toFixed(6),
                        score: (Math.abs(parseFloat(t.priceChangePercent)) * (parseFloat(t.quoteVolume) / 1000000)).toFixed(2)
                    }))
                    .sort((a, b) => b.score - a.score);

                lista.innerHTML = filtered.map(i => `
                    <tr class="hover:bg-slate-700/30">
                        <td class="px-4 py-3 font-bold">${i.s}</td>
                        <td class="px-4 py-3 text-blue-400 font-mono">${i.p}</td>
                        <td class="px-4 py-3 font-black text-slate-300">${i.score}</td>
                    </tr>
                `).join('');

                status.innerText = "LIVE";
                status.className = "text-[10px] font-bold px-2 py-1 rounded bg-green-900/40 text-green-400";
            } catch (e) {
                status.innerText = "ERRO DE REDE";
                status.className = "text-[10px] font-bold px-2 py-1 rounded bg-red-900/40 text-red-400";
            }
        }
        update();
        setInterval(update, 30000);
    </script>
</body>
</html>
