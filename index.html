<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDC Penny Tracker - Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-2xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black text-slate-900">USDC Tracker <span class="text-blue-600">v3.2</span></h1>
            <div id="status" class="text-[10px] font-bold px-2 py-1 rounded bg-slate-200">Sincronizando...</div>
        </header>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr class="text-slate-400 font-bold uppercase text-[10px]">
                        <th class="px-4 py-3">Par</th>
                        <th class="px-4 py-3">Preço</th>
                        <th class="px-4 py-3">Score</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-50">
                    <tr><td colspan="3" class="px-4 py-10 text-center text-slate-400">Ligando à Binance via Proxy Seguro...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function update() {
            const status = document.getElementById('status');
            const table = document.getElementById('tableBody');
            
            try {
                // Usamos o AllOrigins com um parâmetro aleatório para forçar a atualização e evitar o erro da image_8504bd.png
                const target = `https://api.binance.com/api/3/ticker/24hr?t=${Date.now()}`;
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}`);
                const json = await res.json();
                const data = JSON.parse(json.contents);

                const filtered = data
                    .filter(t => t.symbol.endsWith('USDC') && parseFloat(t.lastPrice) <= 0.05 && parseFloat(t.quoteVolume) > 100000)
                    .map(t => ({
                        s: t.symbol.replace('USDC', ''),
                        p: parseFloat(t.lastPrice).toFixed(6),
                        score: (Math.abs(parseFloat(t.priceChangePercent)) * (parseFloat(t.quoteVolume) / 1000000)).toFixed(2)
                    }))
                    .sort((a, b) => b.score - a.score);

                table.innerHTML = filtered.map(i => `
                    <tr>
                        <td class="px-4 py-3 font-bold text-slate-900">${i.s}</td>
                        <td class="px-4 py-3 text-blue-600 font-mono">${i.p}</td>
                        <td class="px-4 py-3 font-black text-slate-700">${i.score}</td>
                    </tr>
                `).join('');
                
                status.innerText = "ONLINE";
                status.className = "text-[10px] font-bold px-2 py-1 rounded bg-green-100 text-green-600";
            } catch (e) {
                status.innerText = "ERRO";
                status.className = "text-[10px] font-bold px-2 py-1 rounded bg-red-100 text-red-600";
            }
        }
        update();
        setInterval(update, 30000);
    </script>
</body>
</html>
