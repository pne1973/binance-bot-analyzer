<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDC Penny Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-extrabold text-slate-900">USDC Penny Tracker <span class="text-blue-600 text-xs font-mono">v1.6</span></h1>
                <p id="status-text" class="text-slate-500 text-sm">A carregar dados do mercado...</p>
            </div>
            <button onclick="updateMarketData()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg shadow transition-all">
                Atualizar
            </button>
        </header>

        <!-- Garante que este ID existe sempre para evitar erros de JS -->
        <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8"></div>

        <div class="card overflow-hidden shadow-sm">
            <div class="bg-white border-b border-slate-100 px-6 py-4 flex justify-between items-center">
                <h2 class="font-bold text-slate-800">Ranking de Eficiência</h2>
                <div id="loader" class="hidden text-blue-600 text-xs font-bold pulse">SINCRONIZANDO...</div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-[10px] uppercase tracking-widest font-bold">
                        <tr>
                            <th class="px-6 py-3">Par</th>
                            <th class="px-6 py-3">Preço</th>
                            <th class="px-6 py-3">Vol (24h)</th>
                            <th class="px-6 py-3">Score</th>
                        </tr>
                    </thead>
                    <tbody id="marketTableBody" class="divide-y divide-slate-100">
                        <tr><td colspan="4" class="px-6 py-10 text-center text-slate-400">Aguardando resposta da API...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function updateMarketData() {
            const loader = document.getElementById('loader');
            const statusText = document.getElementById('status-text');
            loader.classList.replace('hidden', 'block');

            try {
                // Tenta ligação direta primeiro
                const response = await fetch('https://api.binance.com/api/3/ticker/24hr');
                if (!response.ok) throw new Error('CORS');
                const data = await response.json();
                processAndRender(data);
                statusText.innerText = "Dados atualizados via Direct API.";
            } catch (e) {
                // Fallback para Proxy se a image_85663a.png indicar que continua vazio
                try {
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://api.binance.com/api/3/ticker/24hr')}`;
                    const res = await fetch(proxyUrl);
                    const wrap = await res.json();
                    processAndRender(JSON.parse(wrap.contents));
                    statusText.innerText = "Dados atualizados via Proxy.";
                } catch (err) {
                    statusText.innerText = "Erro ao ligar à Binance.";
                }
            } finally {
                loader.classList.replace('block', 'hidden');
            }
        }

        function processAndRender(data) {
            const table = document.getElementById('marketTableBody');
            const stats = document.getElementById('statsGrid');

            const filtered = data
                .filter(t => t.symbol.endsWith('USDC') && parseFloat(t.lastPrice) <= 0.05 && parseFloat(t.quoteVolume) > 100000)
                .map(t => {
                    const vola = Math.abs(parseFloat(t.priceChangePercent));
                    const volume = parseFloat(t.quoteVolume);
                    return {
                        symbol: t.symbol,
                        price: parseFloat(t.lastPrice).toFixed(6),
                        volume: volume,
                        score: (vola * (volume / 1000000)).toFixed(2)
                    };
                })
                .sort((a, b) => b.score - a.score);

            if (filtered.length === 0) {
                table.innerHTML = '<tr><td colspan="4" class="px-6 py-10 text-center text-slate-400">Nenhum par penny encontrado no momento.</td></tr>';
                return;
            }

            // Renderiza Tabela
            table.innerHTML = filtered.map(i => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4 font-bold text-slate-900">${i.symbol}</td>
                    <td class="px-6 py-4 text-blue-600 font-mono text-sm">${i.price}</td>
                    <td class="px-6 py-4 text-slate-500 text-sm">${(i.volume/1000).toFixed(0)}k</td>
                    <td class="px-6 py-4 font-black text-slate-800">${i.score}</td>
                </tr>
            `).join('');

            // Renderiza Cartões de Estatística
            const top = filtered[0];
            stats.innerHTML = `
                <div class="card p-4">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Top Pair</p>
                    <h3 class="text-xl font-black text-slate-900">${top.symbol}</h3>
                </div>
                <div class="card p-4">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Pares Ativos</p>
                    <h3 class="text-xl font-black text-slate-900">${filtered.length}</h3>
                </div>
                <div class="card p-4">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Max Score</p>
                    <h3 class="text-xl font-black text-blue-600">${top.score}</h3>
                </div>
            `;
        }

        // Execução inicial
        updateMarketData();
        setInterval(updateMarketData, 60000); // Atualiza a cada minuto
    </script>
</body>
</html>
