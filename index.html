<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDC Penny Tracker - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .status-pill { font-size: 10px; font-weight: 900; padding: 4px 12px; border-radius: 9999px; text-transform: uppercase; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tighter">USDC Penny Tracker <span class="text-blue-600 text-xs">v3.1</span></h1>
                <p class="text-slate-500 text-sm mt-1">Filtro: Preço < $0.05 | Volume > $100k</p>
            </div>
            <div id="status" class="status-pill bg-slate-200 text-slate-500">Iniciando...</div>
        </header>

        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr class="text-[10px] text-slate-400 font-black uppercase tracking-widest">
                        <th class="px-6 py-4">Ativo</th>
                        <th class="px-6 py-4">Preço (USDC)</th>
                        <th class="px-6 py-4">Score Eficiência</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-50">
                    <tr>
                        <td colspan="3" class="px-6 py-24 text-center">
                            <div class="flex flex-col items-center gap-2">
                                <div class="w-6 h-6 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                                <span class="text-slate-400 font-bold text-sm">Sincronizando com Binance...</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function updateData() {
            const status = document.getElementById('status');
            const table = document.getElementById('tableBody');

            try {
                // Usando um proxy de bypass direto para evitar o erro da image_85081b.png
                const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.binance.com/api/3/ticker/24hr'));
                
                if (!response.ok) throw new Error();
                
                const wrapper = await response.json();
                const data = JSON.parse(wrapper.contents);

                const filtered = data
                    .filter(t => t.symbol.endsWith('USDC') && parseFloat(t.lastPrice) <= 0.05 && parseFloat(t.quoteVolume) > 100000)
                    .map(t => {
                        const vola = Math.abs(parseFloat(t.priceChangePercent));
                        const volume = parseFloat(t.quoteVolume);
                        return {
                            symbol: t.symbol.replace('USDC', ''),
                            price: parseFloat(t.lastPrice).toFixed(6),
                            score: (vola * (volume / 1000000)).toFixed(2)
                        };
                    })
                    .sort((a, b) => b.score - a.score);

                render(filtered);
                status.innerText = "Conectado";
                status.className = "status-pill bg-green-100 text-green-600";
            } catch (e) {
                status.innerText = "Erro de Rede";
                status.className = "status-pill bg-red-100 text-red-600";
                console.error(e);
            }
        }

        function render(items) {
            const table = document.getElementById('tableBody');
            if (items.length === 0) {
                table.innerHTML = '<tr><td colspan="3" class="px-6 py-10 text-center text-slate-400 font-bold">Nenhuma oportunidade encontrada.</td></tr>';
                return;
            }

            table.innerHTML = items.map(item => `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="px-6 py-5">
                        <span class="font-black text-slate-900 text-lg">${item.symbol}</span>
                        <span class="text-[10px] text-slate-400 font-bold">/USDC</span>
                    </td>
                    <td class="px-6 py-5 font-mono text-blue-600 font-bold">${item.price}</td>
                    <td class="px-6 py-5 font-black text-slate-800 text-xl">${item.score}</td>
                </tr>
            `).join('');
        }

        updateData();
        setInterval(updateData, 30000);
    </script>
</body>
</html>
