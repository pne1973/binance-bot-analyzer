<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>USDC Tracker v3.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">
    <div class="max-w-xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold">USDC Penny Tracker <span class="text-blue-400 text-xs">v3.3</span></h1>
            <div id="status" class="text-[10px] bg-gray-800 px-2 py-1 rounded">A ligar...</div>
        </div>

        <div class="bg-gray-800 rounded-lg overflow-hidden border border-gray-700">
            <table class="w-full text-left text-sm">
                <thead class="bg-gray-700 text-gray-400">
                    <tr>
                        <th class="px-4 py-2">PAR</th>
                        <th class="px-4 py-2">PREÇO</th>
                        <th class="px-4 py-2">SCORE</th>
                    </tr>
                </thead>
                <tbody id="lista" class="divide-y divide-gray-700">
                    <tr><td colspan="3" class="p-10 text-center text-gray-500">A carregar dados via Proxy Seguro...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchBinance() {
            const status = document.getElementById('status');
            const lista = document.getElementById('lista');
            
            try {
                // Força a limpeza de cache com um timestamp
                const api = `https://api.binance.com/api/3/ticker/24hr?t=${Date.now()}`;
                const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(api)}`;
                
                const res = await fetch(proxy);
                const json = await res.json();
                const data = JSON.parse(json.contents);

                const filtered = data
                    .filter(t => t.symbol.endsWith('USDC') && parseFloat(t.lastPrice) <= 0.05 && parseFloat(t.quoteVolume) > 100000)
                    .map(t => ({
                        s: t.symbol.replace('USDC', ''),
                        p: parseFloat(t.lastPrice).toFixed(6),
                        score: (Math.abs(parseFloat(t.priceChangePercent)) * (parseFloat(t.quoteVolume) / 1000000)).toFixed(2)
                    }))
                    .sort((a, b) => b.score - a.score);

                lista.innerHTML = filtered.map(i => `
                    <tr class="hover:bg-gray-750">
                        <td class="px-4 py-3 font-bold">${i.s}</td>
                        <td class="px-4 py-3 text-blue-400 font-mono">${i.p}</td>
                        <td class="px-4 py-3 font-bold">${i.score}</td>
                    </tr>
                `).join('');
                
                status.innerText = "LIVE";
                status.classList.add("text-green-400");
            } catch (e) {
                status.innerText = "ERRO";
                status.classList.add("text-red-400");
            }
        }
        fetchBinance();
        setInterval(fetchBinance, 30000);
    </script>
</body>
</html>
